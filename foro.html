<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad de Apoyo | LumenCare</title>
    
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/foro.css">
</head>
<body>
    <!-- Navegación -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-brand" onclick="window.location.href='index.html'">
                <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2.5"/>
                    <circle cx="20" cy="20" r="12" fill="currentColor" opacity="0.2"/>
                    <path d="M20 8 L20 20 L28 20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="20" cy="20" r="3" fill="currentColor"/>
                </svg>
                <span class="brand-name">LumenCare</span>
            </div>
            
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Inicio</a></li>
                <li><a href="diario.html" class="nav-link">Mi Diario</a></li>
                <li><a href="foro.html" class="nav-link active">Comunidad</a></li>
            </ul>
            
            <div class="nav-actions">
                <div class="user-info" id="userInfo">
                    <span class="user-avatar" id="userAvatar"></span>
                    <span class="user-name" id="userName"></span>
                    <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <main class="forum-main">
        <div class="forum-container">
            <!-- Header -->
            <header class="forum-header">
                <div class="header-content">
                    <div class="header-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="page-title">Comunidad de Bienestar</h1>
                        <p class="page-subtitle">Comparte experiencias, encuentra apoyo y construye conexiones significativas</p>
                    </div>
                </div>
                <button class="btn btn-primary" id="btnNewPost">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    Nueva publicación
                </button>
            </header>

            <!-- Formulario de Nueva Publicación -->
            <div class="post-form-container hidden" id="postFormContainer">
                <div class="post-form-card">
                    <div class="form-header">
                        <h2>Compartir con la comunidad</h2>
                        <button class="modal-close" id="btnClosePostForm">&times;</button>
                    </div>

                    <form id="postForm">
                        <div class="form-group">
                            <label for="postTitle">Título de tu publicación</label>
                            <input type="text" id="postTitle" placeholder="¿De qué quieres hablar?" required>
                        </div>

                        <div class="form-group">
                            <label for="postCategory">Categoría</label>
                            <select id="postCategory" required>
                                <option value="">Selecciona una categoría</option>
                                <option value="stress">😰 Manejo del estrés</option>
                                <option value="anxiety">🧠 Ansiedad académica</option>
                                <option value="motivation">💪 Motivación y metas</option>
                                <option value="relationships">🤝 Relaciones sociales</option>
                                <option value="selfcare">🌱 Autocuidado</option>
                                <option value="success">🎉 Historias de éxito</option>
                                <option value="general">💬 General</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="postContent">Tu mensaje</label>
                            <textarea 
                                id="postContent" 
                                rows="8" 
                                placeholder="Comparte tu experiencia, pregunta o consejo con la comunidad..."
                                required
                            ></textarea>
                            <div class="char-counter">
                                <span id="postCharCount">0</span> caracteres
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" id="btnCancelPost">
                                Cancelar
                            </button>
                            <button type="submit" class="btn btn-primary">
                                Publicar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Filtros -->
            <div class="forum-filters">
                <select id="categoryFilter" class="filter-select">
                    <option value="">Todas las categorías</option>
                    <option value="stress">😰 Manejo del estrés</option>
                    <option value="anxiety">🧠 Ansiedad académica</option>
                    <option value="motivation">💪 Motivación y metas</option>
                    <option value="relationships">🤝 Relaciones sociales</option>
                    <option value="selfcare">🌱 Autocuidado</option>
                    <option value="success">🎉 Historias de éxito</option>
                    <option value="general">💬 General</option>
                </select>

                <select id="sortFilter" class="filter-select">
                    <option value="recent">Más recientes</option>
                    <option value="popular">Más populares</option>
                    <option value="comments">Más comentados</option>
                </select>
            </div>

            <!-- Feed de Publicaciones -->
            <div class="posts-feed" id="postsFeed">
                <!-- Las publicaciones se cargarán aquí -->
            </div>

            <!-- Estado vacío -->
            <div class="empty-state hidden" id="emptyState">
                <div class="empty-icon">
                    <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        <line x1="9" y1="9" x2="15" y2="9"/>
                        <line x1="9" y1="13" x2="15" y2="13"/>
                    </svg>
                </div>
                <h3>No hay publicaciones aún</h3>
                <p>Sé el primero en compartir con la comunidad</p>
                <button class="btn btn-primary" onclick="document.getElementById('btnNewPost').click()">
                    Crear publicación
                </button>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/auth-system.js"></script>
    <script src="js/foro.js"></script>
</body>
</html>
